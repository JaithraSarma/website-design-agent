name: Kudil-Observer CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build

      - name: Output Kudil-Observer success log
        run: |
          echo '{
            "status": "success",
            "workflow": "kudil-observer",
            "repository": "${{ github.repository }}",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "triggered_by": "${{ github.actor }}",
            "run_id": "${{ github.run_id }}",
            "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "node_version": "22",
            "steps": {
              "checkout": "passed",
              "setup_node": "passed",
              "install": "passed",
              "build": "passed"
            },
            "artifacts": {
              "build_output": "dist/",
              "entry_point": "dist/index.html"
            },
            "message": "Kudil-Observer CI pipeline completed successfully. All build steps passed. Handoff to Kudil-Observer testing subsystem is ready."
          }'
